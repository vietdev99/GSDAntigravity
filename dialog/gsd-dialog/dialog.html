<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSD Dialog</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e4e4e7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .backdrop {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
  }

  .modal {
    position: relative;
    background: linear-gradient(145deg, #18181b 0%, #1e1e24 100%);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 16px;
    padding: 32px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(99,102,241,0.1);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: white;
  }

  .logo-text {
    font-size: 13px; font-weight: 600; color: #6366f1;
    letter-spacing: 1px; text-transform: uppercase;
  }

  h1 {
    font-size: 20px; font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .message {
    font-size: 14px; color: #a1a1aa; line-height: 1.5;
    margin-bottom: 24px;
  }

  .options {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 24px;
  }

  .option {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }

  .option:hover {
    background: rgba(99, 102, 241, 0.08);
    border-color: rgba(99, 102, 241, 0.3);
  }

  .option.selected {
    background: rgba(99, 102, 241, 0.12);
    border-color: rgba(99, 102, 241, 0.5);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
  }

  .option .indicator {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .option.multi .indicator { border-radius: 5px; }

  .option.selected .indicator {
    border-color: #6366f1;
    background: #6366f1;
  }

  .option.selected .indicator::after {
    content: '✓'; color: white; font-size: 12px; font-weight: 700;
  }

  .option .label { flex: 1; }

  .option .number {
    font-size: 12px; color: #52525b; font-weight: 600;
    min-width: 20px;
  }

  .text-input {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #e4e4e7;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 24px;
    min-height: 80px;
    resize: vertical;
  }

  .text-input:focus {
    border-color: rgba(99, 102, 241, 0.5);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.08);
  }

  .actions {
    display: flex; gap: 10px; justify-content: flex-end;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-cancel {
    background: rgba(255,255,255,0.05);
    color: #a1a1aa;
  }

  .btn-cancel:hover { background: rgba(255,255,255,0.1); }

  .btn-confirm {
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: white;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }

  .btn-confirm:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
  }

  .btn-confirm:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none;
    box-shadow: none;
  }

  .done-msg {
    text-align: center; padding: 40px;
    animation: fadeIn 0.3s ease;
  }

  .done-msg .check {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
  }

  .done-msg p { color: #a1a1aa; font-size: 14px; }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="backdrop"></div>
<div class="modal" id="modal">
  <div class="logo">
    <div class="logo-icon">G</div>
    <div class="logo-text">GSD Dialog</div>
  </div>
  <div id="content"></div>
</div>

<script>
const DIALOG_ID = 'DIALOG_ID_PLACEHOLDER';
const DATA = /*DIALOG_DATA*/null;

const content = document.getElementById('content');
let selected = DATA.type === 'multi_select' ? [] : null;

function render() {
  let html = `<h1>${esc(DATA.title)}</h1>`;
  if (DATA.message) html += `<p class="message">${esc(DATA.message)}</p>`;

  if (DATA.type === 'text_input') {
    html += `<textarea class="text-input" id="textInput" placeholder="${esc(DATA.placeholder || 'Type your answer...')}" autofocus></textarea>`;
  } else if (DATA.options && DATA.options.length > 0) {
    html += `<div class="options">`;
    DATA.options.forEach((opt, i) => {
      const cls = DATA.type === 'multi_select' ? 'option multi' : 'option';
      html += `<div class="${cls}" data-index="${i}" onclick="toggle(${i})">
        <span class="number">${i + 1}</span>
        <div class="indicator"></div>
        <span class="label">${esc(opt)}</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="actions">
    <button class="btn btn-cancel" onclick="cancel()">Cancel</button>
    <button class="btn btn-confirm" id="confirmBtn" onclick="confirm()">Confirm</button>
  </div>`;

  content.innerHTML = html;
  updateUI();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function toggle(index) {
  if (DATA.type === 'multi_select') {
    const idx = selected.indexOf(index);
    if (idx >= 0) selected.splice(idx, 1);
    else selected.push(index);
  } else {
    selected = index;
  }
  updateUI();
}

function updateUI() {
  document.querySelectorAll('.option').forEach((el, i) => {
    if (DATA.type === 'multi_select') {
      el.classList.toggle('selected', selected.includes(i));
    } else {
      el.classList.toggle('selected', selected === i);
    }
  });

  const btn = document.getElementById('confirmBtn');
  if (btn) {
    if (DATA.type === 'text_input') {
      btn.disabled = false;
    } else if (DATA.type === 'multi_select') {
      btn.disabled = selected.length === 0;
    } else {
      btn.disabled = selected === null;
    }
  }
}

async function submit(result) {
  try {
    await fetch('/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dialogId: DIALOG_ID, result }),
    });
  } catch (e) {}

  content.innerHTML = `<div class="done-msg">
    <div class="check">✓</div>
    <h1>Response Sent</h1>
    <p>You can close this tab.</p>
  </div>`;

  setTimeout(() => window.close(), 1500);
}

function confirm() {
  let result;
  if (DATA.type === 'text_input') {
    result = { type: 'text', value: document.getElementById('textInput').value };
  } else if (DATA.type === 'multi_select') {
    result = { type: 'multi_select', selected: selected.map(i => DATA.options[i]) };
  } else {
    result = { type: 'single_select', selected: DATA.options[selected] };
  }
  submit(result);
}

function cancel() {
  submit({ cancelled: true, selected: null });
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (DATA.type !== 'text_input') {
    const num = parseInt(e.key);
    if (num >= 1 && num <= (DATA.options || []).length) {
      toggle(num - 1);
    }
  }
  if (e.key === 'Enter' && !document.getElementById('confirmBtn')?.disabled) {
    if (DATA.type === 'text_input' && !e.ctrlKey) return;
    confirm();
  }
  if (e.key === 'Escape') cancel();
});

render();
</script>
</body>
</html>
